name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I have not included private media, credentials, or personal paths.
          required: true
