name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not attach private media, personal paths, or unredacted logs."
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0 or commit hash"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation
      options:
        - Windows release ZIP
        - Running from source
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic sample media where possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Anonymized diagnostics
      description: Paste output copied from the Diagnostics tab after reviewing it.
